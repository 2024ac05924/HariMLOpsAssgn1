apiVersion: apps/v1
kind: Deployment

metadata:
  name: heart-disease-api

spec:
  replicas: 1

  selector:
    matchLabels:
      app: heart-disease-api

  template:
    metadata:
      labels:
        app: heart-disease-api

    spec:
      containers:

      - name: heart-disease-api

        image: asia-south1-docker.pkg.dev/famous-hull-499314-j5/heart-disease-repo/heart-disease-api:latest

        imagePullPolicy: Always

        ports:

        - containerPort: 8080

        resources:

          requests:
            cpu: "250m"
            memory: "256Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"

        readinessProbe:

          httpGet:
            path: /health
            port: 8080

          initialDelaySeconds: 5

          periodSeconds: 10

        livenessProbe:

          httpGet:
            path: /health
            port: 8080

          initialDelaySeconds: 15

          periodSeconds: 20